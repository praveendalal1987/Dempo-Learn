<!--
  Dempo Learn — generic notification email template for MSG91.
  Used for grade/announcement/message notifications (see notifications.ts).
  Variables sent by the app: name, title, body, link.
  Set this template's id as MSG91_EMAIL_TEMPLATE_ID (see docs/email-setup.md).
-->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>##title##</title>
  </head>
  <body style="margin:0; padding:0; background-color:#f4f4f7; font-family:'Segoe UI',Roboto,Helvetica,Arial,sans-serif; color:#1f2937;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#f4f4f7; padding:24px 0;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:520px; background-color:#ffffff; border-radius:16px; overflow:hidden; box-shadow:0 6px 24px rgba(0,0,0,0.06);">
            <tr>
              <td style="background-color:#7c3aed; background-image:linear-gradient(135deg,#7c3aed 0%,#d946ef 55%,#fb923c 100%); padding:28px 32px;">
                <div style="font-size:20px; font-weight:700; color:#ffffff;">Dempo Learn</div>
              </td>
            </tr>
            <tr>
              <td style="padding:32px;">
                <h1 style="margin:0 0 12px 0; font-size:20px; font-weight:700; color:#111827;">##title##</h1>
                <p style="margin:0 0 24px 0; font-size:16px; line-height:1.6; color:#374151;">Hi ##name##,</p>
                <p style="margin:0 0 28px 0; font-size:16px; line-height:1.6; color:#374151;">##body##</p>
                <table role="presentation" cellpadding="0" cellspacing="0">
                  <tr>
                    <td align="center" bgcolor="#7c3aed" style="border-radius:9999px;">
                      <a href="##link##" target="_blank" style="display:inline-block; padding:12px 28px; font-size:15px; font-weight:600; color:#ffffff; text-decoration:none; border-radius:9999px;">Open Dempo Learn &rarr;</a>
                    </td>
                  </tr>
                </table>
              </td>
            </tr>
            <tr>
              <td style="padding:20px 32px 28px 32px; border-top:1px solid #f0f0f4;">
                <p style="margin:0; font-size:12px; line-height:1.6; color:#9ca3af;">You're receiving this from Dempo Learn. Manage notifications in your account settings.</p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
