components:
  parameters:
    CourseId:
      name: courseId
      in: path
      required: true
      schema:
        type: integer
    AssignmentId:
      name: assignmentId
      in: path
      required: true
      schema:
        type: integer
    SubmissionId:
      name: submissionId
      in: path
      required: true
      schema:
        type: integer
    MaterialId:
      name: materialId
      in: path
      required: true
      schema:
        type: integer
    SessionId:
      name: sessionId
      in: path
      required: true
      schema:
        type: integer
    CohortId:
      name: cohortId
      in: path
      required: true
      schema:
        type: integer
    QuizId:
      name: quizId
      in: path
      required: true
      schema:
        type: integer
    AttemptId:
      name: attemptId
      in: path
      required: true
      schema:
        type: integer
    GroupId:
      name: groupId
      in: path
      required: true
      schema:
        type: integer
    GroupTaskId:
      name: taskId
      in: path
      required: true
      schema:
        type: integer
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string

    OkResponse:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean

    User:
      type: object
      required: [id, email, role, createdAt]
      properties:
        id:
          type: string
        email:
          type: string
        name:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        role:
          type: string
          enum: [student, teacher, dean, course_coordinator, unassigned]
        bio:
          type: ["string", "null"]
        title:
          type: ["string", "null"]
        linkedinUrl:
          type: ["string", "null"]
        isAdmin:
          type: boolean
        createdAt:
          type: string
          format: date-time
        activeCourseCount:
          type: integer

    TeacherInvite:
      type: object
      required: [id, email, createdAt]
      properties:
        id:
          type: integer
        email:
