openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: users
    description: Current user and profile
  - name: courses
    description: Course management and enrollment
  - name: assignments
    description: Assignments within courses
  - name: submissions
    description: Assignment submissions and grading
  - name: quizzes
    description: Course quizzes and quiz attempts
  - name: materials
    description: Course materials shared with students
  - name: messaging
    description: In-app course messaging and announcements
  - name: dashboard
    description: Dashboard summaries
  - name: grades
    description: Grades, course progress and leaderboards
  - name: admin
    description: Admin-only endpoints
  - name: cohorts
    description: Teacher-managed student cohorts
  - name: groups
    description: Course-scoped student groups for group assignments
  - name: Storage
    description: Object storage upload and serving endpoints.
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /me:
    get:
      operationId: getMe
      tags: [users]
      summary: Get the current authenticated user (provisions on first call)
      responses:
        "200":
          description: The current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    patch:
      operationId: updateMe
      tags: [users]
      summary: Update the current user's profile or role
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /teachers/{teacherId}/profile:
    get:
      operationId: getTeacherProfile
      tags: [users]
      summary: Get a teacher's public profile by id
      parameters:
        - name: teacherId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Teacher profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeacherProfile"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /courses:
    get:
      operationId: listCourses
      tags: [courses]
      summary: List courses for the current user (owned if teacher, enrolled if student)
      responses:
        "200":
          description: Courses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Course"
    post:
      operationId: createCourse
      tags: [courses]
      summary: Create a course (teacher)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CourseInput"
      responses:
        "201":
          description: Created course
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Course"

  /courses/join:
    post:
      operationId: joinCourse
      tags: [courses]
      summary: Join a course by invite code (student)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JoinCourseInput"
      responses:
        "200":
          description: Joined course
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Course"
        "404":
          description: Invalid invite code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /courses/{courseId}:
    get:
      operationId: getCourse
      tags: [courses]
      summary: Get a course by id
      parameters:
        - $ref: "#/components/parameters/CourseId"
      responses:
        "200":
          description: Course
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Course"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /courses/{courseId}/students:
    get:
      operationId: listCourseStudents
      tags: [courses]
      summary: List students enrolled in a course
      parameters:
        - $ref: "#/components/parameters/CourseId"
      responses:
        "200":
          description: Students
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"

  /courses/{courseId}/invite:
    post:
      operationId: inviteStudent
      tags: [courses]
      summary: Invite a student by email (records an invite)
      parameters:
        - $ref: "#/components/parameters/CourseId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InviteInput"
      responses:
        "201":
          description: Invite recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invite"

  /courses/{courseId}/invites:
    get:
      operationId: listInvites
      tags: [courses]
      summary: List the course roster of invited student emails (teacher only)
      parameters:
        - $ref: "#/components/parameters/CourseId"
      responses:
        "200":
          description: Roster of invited students
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Invite"

  /courses/{courseId}/invites/{inviteId}:
    delete:
      operationId: removeInvite
      tags: [courses]
      summary: Remove a student from the course roster (teacher only)
      parameters:
        - $ref: "#/components/parameters/CourseId"
        - name: inviteId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Invite removed

  /courses/{courseId}/students/{studentId}:
    delete:
      operationId: removeCourseStudent
      tags: [courses]
      summary: Remove an enrolled student from the course and roster (teacher only)
      parameters:
        - $ref: "#/components/parameters/CourseId"
        - name: studentId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Student removed
        "404":
          description: Course or enrollment not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /courses/{courseId}/plan:
    get:
      operationId: getCoursePlan
      tags: [courses]
      summary: Get the hour-wise course plan (locked days hide details for students)
      parameters:
        - $ref: "#/components/parameters/CourseId"
      responses:
        "200":
          description: Course plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoursePlan"
    put:
      operationId: updateCoursePlan
      tags: [courses]
      summary: Replace the course plan (teacher only)
      parameters:
        - $ref: "#/components/parameters/CourseId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CoursePlanInput"
      responses:
        "200":
          description: Updated course plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoursePlan"

  /courses/{courseId}/assignments:
    get:
      operationId: listAssignments
      tags: [assignments]
      summary: List assignments in a course (includes current user's submission status)
      parameters:
        - $ref: "#/components/parameters/CourseId"
      responses:
        "200":
          description: Assignments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Assignment"
    post:
      operationId: createAssignment
      tags: [assignments]
      summary: Create an assignment (teacher)
      parameters:
        - $ref: "#/components/parameters/CourseId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssignmentInput"
      responses:
        "201":
          description: Created assignment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Assignment"

  /assignments/{assignmentId}:
    get:
      operationId: getAssignment
      tags: [assignments]
      summary: Get an assignment by id
      parameters:
        - $ref: "#/components/parameters/AssignmentId"
      responses:
        "200":
          description: Assignment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Assignment"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    patch:
      operationId: updateAssignment
      tags: [assignments]
      summary: Update an assignment and its targeted audience (teacher only)
      parameters:
        - $ref: "#/components/parameters/AssignmentId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssignmentUpdate"
      responses:
        "200":
          description: Updated assignment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Assignment"
        "403":
          description: Not the course teacher
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /assignments/{assignmentId}/submissions:
    get:
      operationId: listAssignmentSubmissions
      tags: [submissions]
      summary: List submissions for an assignment (teacher grading queue)
      parameters:
        - $ref: "#/components/parameters/AssignmentId"
      responses:
        "200":
          description: Submissions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Submission"
    post:
      operationId: createSubmission
      tags: [submissions]
      summary: Submit an assignment (student). Triggers AI grading and plagiarism check.
      parameters:
        - $ref: "#/components/parameters/AssignmentId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmissionInput"
      responses:
        "201":
          description: Created submission
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Submission"

  /assignments/{assignmentId}/similarity:
    post:
      operationId: runSimilarityCheck
      tags: [submissions]
      summary: Re-run pairwise similarity detection for an assignment (teacher only)
      parameters:
        - $ref: "#/components/parameters/AssignmentId"
      responses:
        "200":
          description: Similarity recomputed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimilarityRunResult"
        "403":
          description: Not the course teacher
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /similarities/{similarityId}/dismissal:
    patch:
      operationId: setSimilarityDismissal
      tags: [submissions]
      summary: Dismiss or restore a flagged similarity pair (teacher only)
      parameters:
        - name: similarityId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SimilarityDismissalInput"
      responses:
        "200":
          description: Updated dismissal state
          content:
            application/json:
              schema:
                type: object
                required: [id]
                properties:
                  id:
                    type: integer
                  dismissedAt:
                    type: ["string", "null"]
                    format: date-time
        "403":
          description: Not the course teacher
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Similarity pair not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /courses/{courseId}/similarities:
    get:
      operationId: listCourseSimilarities
      tags: [submissions]
      summary: List all flagged similarity pairs across a course's assignments (teacher only)
      parameters:
        - $ref: "#/components/parameters/CourseId"
      responses:
        "200":
          description: Flagged similarity pairs across all assignments in the course
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CourseSimilarityPair"
        "403":
          description: Not the course teacher
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Course not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /submissions/mine:
    get:
      operationId: listMySubmissions
      tags: [submissions]
      summary: List the current student's submissions
      responses:
        "200":
          description: Submissions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Submission"

  /submissions/{submissionId}:
    get:
      operationId: getSubmission
      tags: [submissions]
      summary: Get a submission by id
      parameters:
        - $ref: "#/components/parameters/SubmissionId"
      responses:
        "200":
          description: Submission
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Submission"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /submissions/{submissionId}/comparison/{otherSubmissionId}:
    get:
      operationId: getSubmissionComparison
      tags: [submissions]
      summary: Side-by-side comparison of two flagged submissions with matched passages (teacher only)
      parameters:
        - $ref: "#/components/parameters/SubmissionId"
        - name: otherSubmissionId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Comparison with highlight ranges
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimilarityComparison"
        "403":
          description: Not authorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /submissions/{submissionId}/grade:
    patch:
      operationId: gradeSubmission
      tags: [submissions]
      summary: Grade a submission (teacher) — accept AI or override
      parameters:
        - $ref: "#/components/parameters/SubmissionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GradeInput"
      responses:
        "200":
          description: Graded submission
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Submission"

  /courses/{courseId}/quizzes:
    get:
      operationId: listQuizzes
      tags: [quizzes]
      summary: List quizzes in a course (students see published only, with their attempt status)
      parameters:
        - $ref: "#/components/parameters/CourseId"
      responses:
        "200":
          description: Quizzes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Quiz"
    post:
      operationId: createQuiz
      tags: [quizzes]
      summary: Create a quiz with its questions (teacher only)
      parameters:
        - $ref: "#/components/parameters/CourseId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuizInput"
      responses:
        "201":
          description: Created quiz
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quiz"

  /quizzes/{quizId}:
    get:
      operationId: getQuiz
      tags: [quizzes]
      summary: Get a quiz with questions (correct answers hidden from students until results are published)
      parameters:
        - $ref: "#/components/parameters/QuizId"
      responses:
        "200":
          description: Quiz
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quiz"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    put:
      operationId: updateQuiz
      tags: [quizzes]
      summary: Update a quiz and replace its questions (teacher only; questions locked once attempts exist)
      parameters:
        - $ref: "#/components/parameters/QuizId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuizInput"
      responses:
        "200":
          description: Updated quiz
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quiz"
        "409":
          description: Questions cannot change after students have taken the quiz
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    delete:
      operationId: deleteQuiz
      tags: [quizzes]
      summary: Delete a quiz and its questions/attempts (teacher only)
      parameters:
        - $ref: "#/components/parameters/QuizId"
      responses:
        "204":
          description: Deleted

  /quizzes/{quizId}/publish:
    post:
      operationId: publishQuiz
      tags: [quizzes]
      summary: Publish a quiz so students can take it (teacher only)
      parameters:
        - $ref: "#/components/parameters/QuizId"
      responses:
        "200":
          description: Published quiz
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quiz"

  /quizzes/{quizId}/publish-results:
    post:
      operationId: publishQuizResults
      tags: [quizzes]
      summary: Finalize scores and release results to students (teacher only)
      parameters:
        - $ref: "#/components/parameters/QuizId"
      responses:
        "200":
          description: Quiz with results published
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quiz"

  /quizzes/{quizId}/attempts:
    get:
      operationId: listQuizAttempts
      tags: [quizzes]
      summary: List all attempts for a quiz (teacher results view)
      parameters:
        - $ref: "#/components/parameters/QuizId"
      responses:
        "200":
          description: Attempts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/QuizAttempt"
    post:
      operationId: createQuizAttempt
      tags: [quizzes]
      summary: Submit quiz answers (enrolled student, one attempt). Multiple-choice auto-scored; short answers AI-scored.
      parameters:
        - $ref: "#/components/parameters/QuizId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuizAttemptInput"
      responses:
        "201":
          description: Created attempt
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuizAttempt"
        "409":
          description: Already attempted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /quiz-attempts/{attemptId}/grade:
    patch:
      operationId: gradeQuizAttempt
      tags: [quizzes]
      summary: Adjust per-question scores for an attempt (teacher only)
      parameters:
        - $ref: "#/components/parameters/AttemptId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuizGradeInput"
      responses:
        "200":
          description: Updated attempt
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuizAttempt"

  /courses/{courseId}/materials:
    get:
      operationId: listCourseMaterials
      tags: [materials]
      summary: List course materials (teacher and enrolled students)
      parameters:
        - $ref: "#/components/parameters/CourseId"
      responses:
        "200":
          description: Course materials
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CourseMaterial"
    post:
      operationId: createCourseMaterial
      tags: [materials]
      summary: Post a course material (teacher only)
      parameters:
        - $ref: "#/components/parameters/CourseId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CourseMaterialInput"
      responses:
        "201":
          description: Created material
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CourseMaterial"

  /courses/{courseId}/materials/unseen:
    get:
      operationId: getUnseenMaterialsCount
      tags: [materials]
      summary: Count materials posted since the current user last viewed the Materials tab
      parameters:
        - $ref: "#/components/parameters/CourseId"
      responses:
        "200":
          description: Unseen materials count
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnseenMaterialsCount"

  /courses/{courseId}/materials/seen:
    post:
      operationId: markMaterialsSeen
      tags: [materials]
      summary: Mark all course materials as seen for the current user
      parameters:
        - $ref: "#/components/parameters/CourseId"
      responses:
        "204":
          description: Marked as seen

  /materials/{materialId}:
    patch:
      operationId: updateCourseMaterial
      tags: [materials]
      summary: Update a course material (teacher only)
      parameters:
        - $ref: "#/components/parameters/MaterialId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CourseMaterialInput"
      responses:
        "200":
          description: Updated material
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CourseMaterial"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    delete:
      operationId: deleteCourseMaterial
      tags: [materials]
      summary: Delete a course material (teacher only)
      parameters:
        - $ref: "#/components/parameters/MaterialId"
      responses:
        "204":
          description: Material deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /courses/{courseId}/messages:
    get:
      operationId: listMessages
      tags: [messaging]
      summary: List messages in a course thread for the current user
      parameters:
        - $ref: "#/components/parameters/CourseId"
      responses:
        "200":
          description: Messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"
    post:
      operationId: sendMessage
      tags: [messaging]
      summary: Send a message or announcement in a course
      parameters:
        - $ref: "#/components/parameters/CourseId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessageInput"
      responses:
        "201":
          description: Created message
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"

  /messages/read:
    post:
      operationId: markMessagesRead
      tags: [messaging]
      summary: Mark messages as read
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MarkReadInput"
      responses:
        "200":
          description: Marked read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /inbox:
    get:
      operationId: getInbox
      tags: [messaging]
      summary: Get inbox thread summaries with unread counts for the current user
      responses:
        "200":
          description: Inbox threads
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InboxThread"

  /courses/{courseId}/my-stats:
    get:
      operationId: getCourseMyStats
      tags: [grades]
      summary: Per-student course stats (overall score, progress, submission summary) for the current user
      parameters:
        - $ref: "#/components/parameters/CourseId"
      responses:
        "200":
          description: Course stats for the current student
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CourseStudentStats"
        "404":
          description: Course not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /courses/{courseId}/leaderboard:
    get:
      operationId: getCourseLeaderboard
      tags: [grades]
      summary: Leaderboard of enrolled students ranked by overall score (names only)
      parameters:
        - $ref: "#/components/parameters/CourseId"
      responses:
        "200":
          description: Course leaderboard
          content:
            application/json:
              schema:
