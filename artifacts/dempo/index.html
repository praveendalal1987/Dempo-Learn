  <body>
    <script>
      (function () {
        try {
          var theme = localStorage.getItem("theme");
          var dark =
            theme === "dark" ||
            ((!theme || theme === "system") &&
              window.matchMedia("(prefers-color-scheme: dark)").matches);
          if (dark) document.documentElement.classList.add("dark");
        } catch (e) {}
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
