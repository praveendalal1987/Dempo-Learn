kind = "web"
previewPath = "/"
title = "Dempo"
version = "1.0.0"
id = "artifacts/dempo"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20215

[services.development]
run = "pnpm --filter @workspace/dempo run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/dempo", "run", "build" ]
serve = "static"
publicDir = "artifacts/dempo/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20215"
BASE_PATH = "/"
